version: '3.8'

services:
  # Backend Flask API
  backend:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - AI_API_KEY=${AI_API_KEY}
      - FINANCE_API_KEY=${FINANCE_API_KEY}
    volumes:
      - ../backend:/app
    networks:
      - wealthflow-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React App (Development)
  frontend-dev:
    image: node:19-alpine
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev
    networks:
      - wealthflow-network
    profiles:
      - dev

  # Frontend Production Build
  frontend-prod:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - wealthflow-network
    restart: unless-stopped
    profiles:
      - prod

  # Nginx Reverse Proxy (Production)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - frontend-prod
    networks:
      - wealthflow-network
    restart: unless-stopped
    profiles:
      - prod

  # Redis for caching (Optional)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - wealthflow-network
    restart: unless-stopped
    profiles:
      - cache

networks:
  wealthflow-network:
    driver: bridge

volumes:
  redis_data:
